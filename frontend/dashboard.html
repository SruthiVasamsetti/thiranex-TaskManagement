<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View, add, edit, and organize your tasks using the TaskUp dashboard panel.">
  <title>TaskUp - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Navigation Header -->
  <nav class="dashboard-nav" id="main-navigation">
    <div class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
      <span>TaskUp</span>
    </div>
    
    <div class="nav-user">
      <div class="user-profile">
        <div class="avatar" id="user-avatar">U</div>
        <span id="user-display-name">Username</span>
      </div>
      <button class="btn btn-secondary" id="logout-btn" title="Sign Out of Session">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px; vertical-align: middle;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <!-- Primary Workspace Content -->
  <main class="dashboard-main" id="dashboard-layout-main">
    
    <!-- Stats Cards Summary Grid -->
    <section class="stats-grid" aria-label="Task Analytics Cards">
      
      <!-- Total Tasks Card -->
      <div class="stat-card card-glass total" id="card-stat-total">
        <div class="stat-info">
          <h2 id="stat-total-val">0</h2>
          <p>Total Tasks</p>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </div>
      </div>

      <!-- Pending Tasks Card -->
      <div class="stat-card card-glass pending" id="card-stat-pending">
        <div class="stat-info">
          <h2 id="stat-pending-val">0</h2>
          <p>Pending</p>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
      </div>

      <!-- Completed Tasks Card -->
      <div class="stat-card card-glass completed" id="card-stat-completed">
        <div class="stat-info">
          <h2 id="stat-completed-val">0</h2>
          <p>Completed</p>
        </div>
        <div class="stat-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
      </div>

    </section>

    <!-- Filters and Add Actions Row -->
    <section class="control-bar" aria-label="Task listing controls">
      
      <!-- Filter Tabs Container -->
      <div class="filters" role="tablist">
        <button class="filter-btn active" id="filter-all" role="tab" aria-selected="true">All</button>
        <button class="filter-btn" id="filter-pending" role="tab" aria-selected="false">Pending</button>
        <button class="filter-btn" id="filter-completed" role="tab" aria-selected="false">Completed</button>
      </div>

      <!-- Action Button -->
      <button class="btn btn-primary btn-create-task" id="open-create-modal-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>Add Task</span>
      </button>

    </section>

    <!-- Task List Render Interface -->
    <section class="tasks-container" id="tasks-list-region" aria-label="Dynamic User Tasks List">
      <!-- Injected Dynamically by app.js -->
    </section>

  </main>

  <!-- Create & Update Task Modal Dialog -->
  <div class="modal-overlay" id="task-modal-overlay">
    <div class="modal card-glass" id="task-modal">
      
      <header class="modal-header">
        <h2 id="modal-title-text">Create New Task</h2>
        <button class="modal-close" id="close-modal-btn" aria-label="Close dialog">&times;</button>
      </header>

      <form id="task-form">
        
        <!-- Task Title input -->
        <div class="form-group">
          <label for="task-title">TITLE *</label>
          <input 
            type="text" 
            id="task-title" 
            placeholder="What needs to be done?" 
            class="form-control" 
            required 
            maxlength="200"
          >
        </div>

        <!-- Task Description textarea -->
        <div class="form-group">
          <label for="task-desc">DESCRIPTION</label>
          <textarea 
            id="task-desc" 
            placeholder="Add detailed task notes here..." 
            class="form-control" 
            rows="4"
          ></textarea>
        </div>

        <!-- Task Due Date input -->
        <div class="form-group">
          <label for="task-duedate">DUE DATE</label>
          <input 
            type="date" 
            id="task-duedate" 
            class="form-control"
          >
        </div>

        <!-- Hidden input for holding current task ID when editing -->
        <input type="hidden" id="edit-task-target-id" value="">

        <!-- Modal Footer Actions -->
        <footer class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancel-task-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-task-btn">Save Task</button>
        </footer>

      </form>

    </div>
  </div>

  <!-- Frontend Logic Handler -->
  <script src="app.js"></script>
</body>
</html>
